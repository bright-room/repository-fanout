packages:
  - "packages/*"
  - "apps/*"

# --- サプライチェーン強化 ---
# 公開から 7 日 (10080 分) 未満のバージョンは推移的依存も含めインストールしない
minimumReleaseAge: 10080
# パッケージの信頼レベル (provenance) が前回より下がったらインストールを止める
trustPolicy: no-downgrade
# 未承認のビルドスクリプトを持つ依存があれば install を非ゼロ終了で失敗させる
strictDepBuilds: true
# 推移的依存が git / tarball URL 等の exotic source を使うのを禁止（直接依存のみ可）
blockExoticSubdeps: true
# peer 依存の欠落・不整合があれば install を失敗させる
strictPeerDependencies: true

# esbuild はネイティブバイナリの取得に postinstall が必要（strictDepBuilds の許可リスト）。
# workerd / sharp (miniflare 経由) はバイナリを optionalDependencies で取得するため
# postinstall 不要 → 明示的にビルドを拒否する。
allowBuilds:
  esbuild: true
  workerd: false
  sharp: false

name = "repository-fanout"
main = "src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

[vars]
TEMPLATES_REPO = "bright-room/canonical-files"

[[kv_namespaces]]
binding = "MANIFESTS"
id = "950aa4e7da824aba818906bbfaf03873"

[[kv_namespaces]]
binding = "RUNS"
id = "77d96d1327904dbd82ae3216f2b0e0f4"

[[workflows]]
name = "fanout-parent"
binding = "PARENT"
class_name = "ParentWorkflow"

[[workflows]]
name = "fanout-child"
binding = "CHILD"
class_name = "ChildWorkflow"

# Secrets (set via `wrangler secret put`):
#   APP_ID, APP_PRIVATE_KEY            … chloe-chan App
#   SYNC_HMAC_SECRET__<account>        … アカウント別 HMAC シークレット
#   DISCORD_WEBHOOK_URL                … 失敗通知先 Discord Webhook（任意。未設定ならスキップ）

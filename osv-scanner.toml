# OSV-Scanner ignore ポリシー
# ---------------------------------------------------------------------------
# 現時点で対応不能と判断した既知のアドバイザリのみをここに記載する。
# 各エントリには理由 (`reason`) と再レビュー期限 (`ignoreUntil`) を必ず添えること。
# `ignoreUntil` を過ぎるとアドバイザリが再浮上して CI が fail し、意図的な
# 再レビューを強制する。新規・修正可能な脆弱性は ignore せず CI を fail させる。
#
# 記載例:
# [[IgnoredVulns]]
# id = "GHSA-xxxx-xxxx-xxxx"
# ignoreUntil = 2026-12-31
# reason = "transitive dep で fix 未リリース。上流の更新を待つ。"
# ---------------------------------------------------------------------------
